version: '3.8'
services:
  animate-api:
    build: .
    container_name: animate-api
    command: uvicorn api.animate_api:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - API_KEY=${API_KEY}
    volumes:
      - ./api:/app/api
      - ./engine:/app/engine
      - ./config.yaml:/app/config.yaml
  clipstreams-api:
    build: ../ClipStreams
    container_name: clipstreams-api
    command: uvicorn clipstreams_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ../ClipStreams:/app
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipass
      POSTGRES_DB: aimonetize
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - animate-api
      - clipstreams-api
volumes:
  pgdata:
